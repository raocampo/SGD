<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGD - Tablas y Estadisticas</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>

<body class="app-layout page-tablas">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">⚽ SGD</div>
    <nav class="sidebar-nav">
      <a class="nav-btn" href="admin.html"><i class="fas fa-home"></i> Inicio</a>
      <a class="nav-btn" href="campeonatos.html"><i class="fas fa-trophy"></i> Campeonatos</a>
      <a class="nav-btn" href="eventos.html"><i class="fas fa-calendar-alt"></i> Categorías</a>
      <a class="nav-btn" href="equipos.html"><i class="fas fa-users"></i> Equipos</a>
      <a class="nav-btn" href="jugadores.html"><i class="fas fa-user-friends"></i> Jugadores</a>
      <a class="nav-btn" href="sorteo.html"><i class="fas fa-random"></i> Sorteo</a>
      <a class="nav-btn" href="gruposgen.html"><i class="fas fa-layer-group"></i> Grupos</a>
      <a class="nav-btn" href="partidos.html"><i class="fas fa-futbol"></i> Partidos</a>
      <a class="nav-btn" href="planilla.html"><i class="fas fa-clipboard-list"></i> Planillaje</a>
      <a class="nav-btn active" href="tablas.html"><i class="fas fa-table"></i> Tablas</a>
      <a class="nav-btn" href="index.html"><i class="fas fa-globe"></i> Ver Portal</a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="top-bar">
      <button class="nav-toggle" id="nav-toggle" title="Mostrar/ocultar menu"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-chart-line"></i> Gestion de Tablas y Estadisticas</h1>
    </header>

    <main class="main">
      <div class="container tablas-layout">
        <h2><i class="fas fa-table"></i> Tablas por Categoría</h2>

        <div class="config-card" id="tablas-filtros-card">
          <h3>Filtros</h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="select-evento-tablas">Categoría</label>
              <select id="select-evento-tablas">
                <option value="">- Selecciona una categoría -</option>
              </select>
            </div>
          </div>

          <div class="tablas-filtros-actions">
            <button class="btn btn-secondary" id="btn-recargar-eventos">
              <i class="fas fa-rotate"></i> Recargar
            </button>
            <button class="btn btn-primary" id="btn-buscar-tablas">
              <i class="fas fa-search"></i> Buscar
            </button>
          </div>
        </div>

        <div class="partidos-main-tabs" id="tablas-main-tabs">
          <button class="partidos-main-tab active" type="button" data-tablas-target="tab-posiciones">
            Posiciones
          </button>
          <button class="partidos-main-tab" type="button" data-tablas-target="tab-goleadores">
            Goleadores
          </button>
          <button class="partidos-main-tab" type="button" data-tablas-target="tab-tarjetas">
            Tarjetas
          </button>
          <button class="partidos-main-tab" type="button" data-tablas-target="tab-fair-play">
            Fair Play
          </button>
        </div>

        <section id="tab-posiciones" class="partidos-tab-panel active">
          <div id="tablas-posiciones" class="tablas-panel-content"></div>
        </section>

        <section id="tab-goleadores" class="partidos-tab-panel">
          <div id="tablas-goleadores" class="tablas-panel-content"></div>
        </section>

        <section id="tab-tarjetas" class="partidos-tab-panel">
          <div id="tablas-tarjetas" class="tablas-panel-content"></div>
        </section>

        <section id="tab-fair-play" class="partidos-tab-panel">
          <div id="tablas-fair-play" class="tablas-panel-content"></div>
        </section>
      </div>
    </main>
  </div>

  <div class="nav-overlay" id="nav-overlay"></div>

  <script src="js/core.js"></script>
  <script src="js/api.js"></script>
  <script src="js/tablas.js"></script>
</body>

</html>
