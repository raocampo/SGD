<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/grupos.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>

<body class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">⚽ SGD</div>
    <nav class="sidebar-nav">
      <a class="nav-btn" href="admin.html"><i class="fas fa-home"></i> Inicio</a>
      <a class="nav-btn" href="campeonatos.html"><i class="fas fa-trophy"></i> Campeonatos</a>
      <a class="nav-btn" href="eventos.html"><i class="fas fa-calendar-alt"></i> Eventos</a>
      <a class="nav-btn" href="equipos.html"><i class="fas fa-users"></i> Equipos</a>
      <a class="nav-btn" href="jugadores.html"><i class="fas fa-user-friends"></i> Jugadores</a>
      <a class="nav-btn" href="sorteo.html"><i class="fas fa-random"></i> Sorteo</a>
      <a class="nav-btn active" href="gruposgen.html"><i class="fas fa-layer-group"></i> Grupos</a>
      <a class="nav-btn" href="partidos.html"><i class="fas fa-futbol"></i> Partidos</a>
      <a class="nav-btn" href="planilla.html"><i class="fas fa-clipboard-list"></i> Planillaje</a>
      <a class="nav-btn" href="tablas.html"><i class="fas fa-table"></i> Tablas</a>
      <a class="nav-btn" href="index.html"><i class="fas fa-globe"></i> Ver Portal</a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="top-bar">
      <button class="nav-toggle" id="nav-toggle" title="Mostrar/ocultar menú"><i class="fas fa-bars"></i></button>
      <h1>📋 Grupos del Campeonato</h1>
    </header>

  <main class="main">
    <section class="section active">
      <div class="container">
        <h2><i class="fas fa-layer-group text-center"></i> Grupos por Campeonato</h2>

        <div class="actions">
          <button class="btn-back" onclick="volverInicio()">⬅ Volver</button>
          <button class="btn btn-secondary" onclick="exportarGruposPNG()">🖼️ Exportar imagen</button>
          <button class="btn-print" onclick="window.print()">🖨 Imprimir</button>
          <button class="btn-pdf" onclick="exportarPDF()">📄 Exportar PDF</button>
          <button class="btn-share" onclick="compartirRedes()">🔗 Compartir</button>
        </div>

        <div class="action-bar">
          <div class="form-group" style="max-width: 420px;">
            <label for="select-campeonato-grupos">Selecciona campeonato:</label>
            <select id="select-campeonato-grupos">
              <option value="">— Selecciona un campeonato —</option>
            </select>
          </div>

          <button class="btn btn-primary" id="btn-recargar-grupos">
            <i class="fas fa-sync"></i> Recargar
          </button>
        </div>

        <!-- ✅ ZONA EXPORTABLE TIPO “POSTER” -->
        <div id="zona-grupos-export" class="poster">
          
          <div class="poster-titulo">
            <div class="poster-org">
              <img id="poster-org-logo" class="poster-org-logo" crossorigin="anonymous" referrerpolicy="no-referrer"
                alt="Logo Organizador">
            </div>
            <div class="poster-header">

              <div class="poster-titles">
                <div id="poster-organizador" class="poster-subtitle">ORGANIZA: —</div>
                <div id="poster-titulo" class="poster-title">NOMBRE DEL TORNEO</div>
                <div id="poster-detalle" class="poster-detail">—</div>
              </div>
            </div>
          </div>

          <div id="poster-grupos" class="poster-grids">
            <!-- aquí se renderizan los grupos en columnas -->
            <div class="empty-state" style="opacity:.9">
              <i class="fas fa-layer-group"></i>
              <p>Selecciona un campeonato para ver los grupos</p>
            </div>
          </div>

          <div id="poster-sponsors" class="poster-sponsors" style="display:none;">
            <div class="sponsors-title">Auspician</div>
            <div id="sponsors-grid" class="sponsors-grid"></div>
          </div>

        </div>

      </div>
    </section>
  </main>
  </div>

  <div class="nav-overlay" id="nav-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="js/core.js"></script>
  <script src="js/api.js"></script>
  <script src="js/gruposgen.js"></script>
</body>

</html>
