<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGD - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>

<body>
  <main class="main">
    <div class="container" style="max-width: 460px; margin-top: 8vh;">
      <div class="config-card">
        <h2 style="margin-bottom: 8px;"><i class="fas fa-shield-halved"></i> Acceso SGD</h2>
        <p style="margin-bottom: 20px; color: #475569;">Ingresa con tu usuario para continuar.</p>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Correo</label>
            <input id="login-email" type="email" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input id="login-password" type="password" autocomplete="current-password" required />
          </div>
          <button id="login-submit" type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
            <i class="fas fa-right-to-bracket"></i> Ingresar
          </button>
        </form>
        <div style="margin-top: 14px; font-size: 12px; color: #64748b;">
          Si es tu primer ingreso, usa el usuario administrador configurado en backend.
        </div>
      </div>
    </div>
  </main>

  <script src="js/core.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
