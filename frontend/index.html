<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Torneos - Sistema de Gestión Deportiva</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/portal.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>
<body>
  <header class="portal-header">
    <div class="container">
      <h1>⚽ Portal de Torneos</h1>
      <p>Información pública de campeonatos y competencias</p>
      <nav class="portal-nav">
        <a href="login.html"><i class="fas fa-right-to-bracket"></i> Iniciar Sesión</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section id="portal-inicio" class="portal-section active">
        <h2>Torneos y campeonatos</h2>
        <div id="portal-lista-campeonatos" class="grid-container">
          <p class="empty-msg">Cargando...</p>
        </div>
      </section>

      <section id="portal-detalle" class="portal-section">
        <button class="btn btn-secondary" onclick="portalVolver()"><i class="fas fa-arrow-left"></i> Volver</button>
        <div id="portal-detalle-contenido"></div>
      </section>
    </div>
  </main>

  <script src="js/core.js"></script>
  <script src="js/api.js"></script>
  <script src="js/portal.js"></script>
</body>
</html>
