<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LT&C - Auspiciantes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/ltc/Logo.jpeg" type="image/jpeg" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="app-layout page-auspiciantes">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">⚽ LT&C</div>
      <nav class="sidebar-nav">
        <a class="nav-btn" href="admin.html"><i class="fas fa-home"></i> Inicio</a>
        <a class="nav-btn active" href="campeonatos.html"><i class="fas fa-trophy"></i> Campeonatos</a>
        <a class="nav-btn" href="eventos.html"><i class="fas fa-calendar-alt"></i> Eventos</a>
        <a class="nav-btn" href="equipos.html"><i class="fas fa-users"></i> Equipos</a>
        <a class="nav-btn" href="jugadores.html"><i class="fas fa-user-friends"></i> Jugadores</a>
        <a class="nav-btn" href="sorteo.html"><i class="fas fa-random"></i> Sorteo</a>
        <a class="nav-btn" href="gruposgen.html"><i class="fas fa-layer-group"></i> Grupos</a>
        <a class="nav-btn" href="partidos.html"><i class="fas fa-futbol"></i> Partidos</a>
        <a class="nav-btn" href="planilla.html"><i class="fas fa-clipboard-list"></i> Planillaje</a>
        <a class="nav-btn" href="tablas.html"><i class="fas fa-table"></i> Tablas</a>
        <a class="nav-btn" href="index.html"><i class="fas fa-globe"></i> Ver Portal</a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-bar">
        <button class="nav-toggle" id="nav-toggle" title="Mostrar/ocultar menú">
          <i class="fas fa-bars"></i>
        </button>
        <h1><i class="fas fa-handshake"></i> Auspiciantes por Campeonato</h1>
      </header>

      <main class="main">
        <div class="container">
          <div class="partidos-main-tabs" aria-label="Submódulos de campeonatos">
            <button
              type="button"
              class="partidos-main-tab"
              onclick="window.location.href='campeonatos.html'"
            >
              <i class="fas fa-trophy"></i> Campeonatos
            </button>
            <button type="button" class="partidos-main-tab active">
              <i class="fas fa-handshake"></i> Auspiciantes
            </button>
          </div>

          <div class="config-card">
            <h3>Configuración de Auspiciantes</h3>
            <div class="form-grid finanzas-form-grid">
              <div class="form-group">
                <label for="aus-campeonato">Campeonato</label>
                <select id="aus-campeonato">
                  <option value="">Selecciona campeonato</option>
                </select>
              </div>
              <div class="form-group">
                <label for="aus-nombre">Nombre del auspiciantes</label>
                <input id="aus-nombre" type="text" placeholder="Ej: LT&C Sports" />
              </div>
              <div class="form-group">
                <label for="aus-orden">Orden</label>
                <input id="aus-orden" type="number" min="1" step="1" value="1" />
              </div>
              <div class="form-group">
                <label for="aus-activo">Estado</label>
                <select id="aus-activo">
                  <option value="true">Activo</option>
                  <option value="false">Inactivo</option>
                </select>
              </div>
              <div class="form-group form-group-full">
                <label for="aus-logo">Logo</label>
                <input id="aus-logo" type="file" accept="image/png,image/jpeg,image/webp" />
              </div>
            </div>
            <div class="partidos-actions">
              <button class="btn btn-success" id="btn-aus-guardar" type="button">
                <i class="fas fa-save"></i> Guardar auspiciantes
              </button>
              <button class="btn btn-secondary" id="btn-aus-limpiar" type="button">
                <i class="fas fa-eraser"></i> Limpiar
              </button>
            </div>
          </div>

          <div class="card">
            <h3>Listado de auspiciantes</h3>
            <div id="aus-listado" class="tabla-scroll"></div>
          </div>
        </div>
      </main>
    </div>

    <div class="nav-overlay" id="nav-overlay"></div>

    <script src="js/core.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auspiciantes.js"></script>
  </body>
</html>
