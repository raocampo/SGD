<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Público - LT&C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Sora:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/portal.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>
<body class="ltc-landing">
  <header class="ltc-site-header">
    <div class="container ltc-header-inner">
      <a class="ltc-header-brand" href="index.html">
        <img src="assets/ltc/Logo.jpeg" alt="LT&C" />
        <span>LT&C</span>
        <span class="ltc-header-brand-sub">Portal público</span>
      </a>
      <button class="ltc-nav-toggle" id="ltc-nav-toggle" aria-label="Abrir menu">
        <i class="fas fa-bars"></i>
      </button>
      <nav class="ltc-header-nav" id="ltc-nav">
        <a href="index.html#torneos">Torneos</a>
        <a href="index.html#contacto">Contacto</a>
        <a href="login.html" class="ltc-nav-auth-link ltc-nav-auth-link-solid">Ingresar</a>
      </nav>
    </div>
  </header>

  <main class="ltc-main">
    <section class="ltc-teams-section">
      <div class="container">
        <div class="ltc-section-title">
          <h2>PORTAL DE TORNEOS</h2>
          <p>Consulta categorías, jornadas, tabla de posiciones, goleadores y fair play.</p>
        </div>

        <section id="portal-inicio" class="portal-section active">
          <div id="portal-lista-campeonatos" class="portal-campeonatos-grid">
            <p class="empty-msg">Cargando torneos...</p>
          </div>
        </section>

        <section id="portal-detalle" class="portal-section">
          <button class="ltc-btn ltc-btn-back" type="button" onclick="portalVolver()">
            <i class="fas fa-arrow-left"></i>
            Volver al listado
          </button>
          <div id="portal-detalle-contenido"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="js/core.js"></script>
  <script src="js/api.js"></script>
  <script src="js/portal.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.getElementById("ltc-nav-toggle");
      const nav = document.getElementById("ltc-nav");
      if (toggle && nav) {
        toggle.addEventListener("click", () => nav.classList.toggle("open"));
        nav.querySelectorAll("a").forEach((lnk) =>
          lnk.addEventListener("click", () => nav.classList.remove("open"))
        );
      }
    });
  </script>
</body>
</html>
