        <form id="form-campeonato" enctype="multipart/form-data">
          <input type="hidden" id="campeonato-id" />

          <div class="form-group">
            <label for="campeonato-nombre">Nombre del Campeonato:</label>
            <input type="text" id="campeonato-nombre" required />
          </div>

          <div class="form-group">
            <label for="campeonato-organizador">Organizador:</label>
            <input
              type="text"
              id="campeonato-organizador"
              placeholder="Liga, Escuela, Empresa, etc."
            />
          </div>

          <div class="form-group">
            <label for="campeonato-logo">Logo del Campeonato:</label>
            <input type="file" id="campeonato-logo" accept="image/*" />
            <small>Formatos permitidos: JPG, PNG, WEBP. Máx: 2MB.</small>
          </div>

          <div class="form-group">
            <label for="campeonato-tipo">Tipo de Fútbol:</label>
            <select id="campeonato-tipo" required>
              <option value="futbol_11">Fútbol 11</option>
              <option value="futbol_7">Fútbol 7</option>
              <option value="futbol_5">Fútbol 5</option>
            </select>
          </div>

          <div class="form-group">
            <label for="campeonato-sistema">Sistema de Puntuación:</label>
            <select id="campeonato-sistema" required>
              <option value="tradicional">Tradicional (3-1-0)</option>
              <option value="shootouts">Con Shootouts (Fútbol 7/5)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="campeonato-fecha-inicio">Fecha de Inicio:</label>
            <input type="date" id="campeonato-fecha-inicio" required />
          </div>

          <div class="form-group">
            <label for="campeonato-fecha-fin">Fecha de Fin:</label>
            <input type="date" id="campeonato-fecha-fin" required />
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label for="campeonato-min-jugadores">Mínimo de jugadores:</label>
              <input
                type="number"
                id="campeonato-min-jugadores"
                min="1"
                required
              />
            </div>

            <div class="form-group half">
              <label for="campeonato-max-jugadores">Máximo de jugadores:</label>
              <input
                type="number"
                id="campeonato-max-jugadores"
                min="1"
                required
              />
            </div>
          </div>

          <h4>🎨 Colores del campeonato</h4>

          <div class="form-row">
            <div class="form-group half">
              <label for="campeonato-color-primario">Color Primario:</label>
              <input
                type="color"
                id="campeonato-color-primario"
                value="#FACC15"
              />
            </div>

            <div class="form-group half">
              <label for="campeonato-color-secundario">Color Secundario:</label>
              <input
                type="color"
                id="campeonato-color-secundario"
                value="#111827"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="campeonato-color-acento">Color Acento:</label>
            <input type="color" id="campeonato-color-acento" value="#22C55E" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="cerrarModal('modal-campeonato')"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/core.js"></script>

    <script src="js/campeonatos.js"></script>
