<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LT&C - Noticias del Portal</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/ltc/Logo.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>

<body class="app-layout page-noticias">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">⚽ LT&C</div>
    <nav class="sidebar-nav">
      <a class="nav-btn" href="portal-cms.html"><i class="fas fa-newspaper"></i> Portal CMS</a>
      <a class="nav-btn active" href="noticias.html"><i class="fas fa-rss"></i> Noticias</a>
      <a class="nav-btn" href="index.html"><i class="fas fa-globe"></i> Ver Portal</a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="top-bar">
      <button class="nav-toggle" id="nav-toggle" title="Mostrar/ocultar menú"><i class="fas fa-bars"></i></button>
      <h1>Noticias y Blog</h1>
    </header>

    <main class="main">
      <div class="container">
        <div class="config-card">
          <h3 id="noticias-form-title">Nueva noticia</h3>
          <form id="noticias-form">
            <div class="form-grid">
              <div class="form-group">
                <label for="not-titulo">Título</label>
                <input id="not-titulo" required maxlength="180" />
              </div>
              <div class="form-group">
                <label for="not-slug">Slug público</label>
                <input id="not-slug" maxlength="160" placeholder="Se genera automáticamente si lo dejas vacío" />
              </div>
              <div class="form-group">
                <label for="not-estado">Estado</label>
                <select id="not-estado">
                  <option value="borrador" selected>Borrador</option>
                  <option value="publicada">Publicada</option>
                </select>
              </div>
              <div class="form-group">
                <label for="not-imagen">Imagen portada URL</label>
                <input id="not-imagen" placeholder="https://..." />
              </div>
              <div class="form-group form-group-full">
                <label for="not-resumen">Resumen</label>
                <textarea id="not-resumen" rows="3" maxlength="500" placeholder="Resumen corto para cards y listados"></textarea>
              </div>
              <div class="form-group form-group-full">
                <label for="not-contenido">Contenido</label>
                <textarea id="not-contenido" rows="10" required placeholder="Escribe aquí el contenido de la noticia"></textarea>
              </div>
            </div>
            <div class="actions">
              <button id="btn-noticias-guardar" type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Guardar noticia
              </button>
              <button type="button" id="btn-noticias-cancelar" class="btn btn-warning" style="display:none;">
                <i class="fas fa-xmark"></i> Cancelar edición
              </button>
              <button type="button" id="btn-noticias-recargar" class="btn btn-secondary">
                <i class="fas fa-rotate"></i> Recargar
              </button>
            </div>
          </form>
        </div>

        <div class="card">
          <h3>Listado de noticias</h3>
          <div class="tabla-scroll" id="noticias-listado-wrap">
            <p>Cargando noticias...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="nav-overlay" id="nav-overlay"></div>

  <script src="js/core.js"></script>
  <script src="js/api.js"></script>
  <script src="js/noticias.js"></script>
</body>

</html>
