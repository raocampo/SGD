<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGD - Eventos (Categorías)</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">⚽ SGD</div>
      <nav class="sidebar-nav">
        <a class="nav-btn" href="admin.html"><i class="fas fa-home"></i> Inicio</a>
        <a class="nav-btn" href="campeonatos.html"><i class="fas fa-trophy"></i> Campeonatos</a>
        <a class="nav-btn active" href="eventos.html"><i class="fas fa-calendar-alt"></i> Eventos</a>
        <a class="nav-btn" href="equipos.html"><i class="fas fa-users"></i> Equipos</a>
        <a class="nav-btn" href="jugadores.html"><i class="fas fa-user-friends"></i> Jugadores</a>
        <a class="nav-btn" href="sorteo.html"><i class="fas fa-random"></i> Sorteo</a>
        <a class="nav-btn" href="gruposgen.html"><i class="fas fa-layer-group"></i> Grupos</a>
        <a class="nav-btn" href="partidos.html"><i class="fas fa-futbol"></i> Partidos</a>
        <a class="nav-btn" href="planilla.html"><i class="fas fa-clipboard-list"></i> Planillaje</a>
        <a class="nav-btn" href="tablas.html"><i class="fas fa-table"></i> Tablas</a>
        <a class="nav-btn" href="index.html"><i class="fas fa-globe"></i> Ver Portal</a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-bar">
        <button class="nav-toggle" id="nav-toggle" title="Mostrar/ocultar menú"><i class="fas fa-bars"></i></button>
        <h1>📌 Eventos (Categorías)</h1>
      </header>

    <main class="main">
      <section class="section active">
        <div class="container">
          <h2>Eventos del Campeonato</h2>

          <div class="config-card">
            <h3>Seleccionar Campeonato</h3>
            <div class="form-group">
              <label for="select-campeonato">Campeonato:</label>
              <select id="select-campeonato"></select>
            </div>

            <button class="btn btn-primary" onclick="cargarEventos()">
              <i class="fas fa-search"></i> Cargar Eventos
            </button>
          </div>

          <div class="config-card">
            <h3>Crear Evento (Categoría)</h3>

            <div class="form-group">
              <label>Nombre del evento/categoría:</label>
              <input
                id="evt-nombre"
                type="text"
                placeholder="Ej: Abierta / +40 / Femenino"
              />
            </div>

            <div class="form-group">
              <label>Modalidad:</label>
              <select id="evt-modalidad">
                <option value="weekend">Solo fines de semana</option>
                <option value="weekday">Solo entre semana</option>
                <option value="mixed">Mixto</option>
              </select>
            </div>

            <div class="form-group">
              <label>Fecha inicio:</label>
              <input id="evt-fecha-inicio" type="date" />
            </div>

            <div class="form-group">
              <label>Fecha fin:</label>
              <input id="evt-fecha-fin" type="date" />
            </div>

            <button class="btn btn-success" onclick="crearEvento()">
              <i class="fas fa-plus"></i> Crear Evento
            </button>
          </div>

          <div class="action-bar">
            <div class="list-view-toggle" id="eventos-view-toggle" aria-label="Cambiar vista de eventos">
              <button
                type="button"
                id="btn-vista-eventos-cards"
                class="list-view-btn active"
                onclick="cambiarVistaEventos('cards')"
              >
                <i class="fas fa-th-large"></i> Tarjetas
              </button>
              <button
                type="button"
                id="btn-vista-eventos-table"
                class="list-view-btn"
                onclick="cambiarVistaEventos('table')"
              >
                <i class="fas fa-table"></i> Tabla
              </button>
            </div>
          </div>

          <div id="lista-eventos" class="grid-container"></div>
        </div>
      </section>
    </main>
    </div>

    <div class="nav-overlay" id="nav-overlay"></div>

    <script src="js/core.js"></script>
    <script src="js/api.js"></script>
    <script src="js/eventos.js"></script>
  </body>
</html>
